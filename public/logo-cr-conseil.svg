<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CC0000"/>
      <stop offset="100%" style="stop-color:#E85620"/>
    </linearGradient>
    <linearGradient id="crGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CC0000"/>
      <stop offset="100%" style="stop-color:#E85620"/>
    </linearGradient>
  </defs>
  <!-- Hexagon -->
  <polygon points="200,20 350,95 350,245 200,320 50,245 50,95" fill="none" stroke="url(#hexGrad)" stroke-width="16"/>
  <!-- CR monogram -->
  <text x="200" y="200" text-anchor="middle" dominant-baseline="central" font-family="Arial,sans-serif" font-weight="bold" font-size="130" fill="url(#crGrad)">CR</text>
  <!-- C&R text -->
  <text x="200" y="410" text-anchor="middle" font-family="Arial,sans-serif" font-size="62">
    <tspan fill="#CC0000" font-weight="400">C&amp;R </tspan>
    <tspan fill="#333333" font-weight="700">CONSEIL</tspan>
  </text>
</svg>
